<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://kit.fontawesome.com/3e99b3dcc9.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="bg-container">
        <div class="dashboard">
            <h1 class="dashboard-header">Dashboard</h1>
            <div class="options">
                <i class="fas fa-home"></i>
                <p class="option">Home</p>
            </div>
            <div class="options">
                <i class="fas fa-download"></i>
                <p class="option">Downloads</p>
            </div>
            <div class="options fav">
                <i class="fas fa-star"></i>
                <p class="option">Favourites</p>
            </div>
            <div class="options">
                <i class="fas fa-cog"></i>
                <p class="option">Setttings</p>
            </div>

            <div class="options profile">
                <img class="pfp" src="https://assets.ccbp.in/frontend/intermediate-rwd/user-profile-img.png" alt="" />
                <p class="profile-name">Sarah Meyers</p>
            </div>
        </div>
        <div class="favourites">
            <h1 class="fav-header">Favourites</h1>
            <div class="fav-category">
                <h1 class="fc-name">Cars</h1>
                <div class="items">
                    <img class="item-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/car-1-img.png" alt="" />
                    <img class="item-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/car-2-img.png" alt="" />
                    <img class="item-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/car-3-img.png" alt="" />
                </div>
                <h1 class="fc-name">Bikes</h1>
                <div class="items">
                    <img class="item-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/bike-1-img.png" alt="" />
                    <img class="item-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/bike-2-img.png" alt="" />
                    <img class="item-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/bike-3-img.png" alt="" />
                </div>
                <h1 class="fc-name">Houses</h1>
                <div class="items">
                    <img class="item-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/house-1-img.png" alt="" />
                    <img class="item-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/house-2-img.png" alt="" />
                    <img class="item-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/house-3-img.png" alt="" />
                </div>
            </div>
        </div>
    </div>
</body>

</html>
