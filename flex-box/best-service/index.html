<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css">

            <img class="image" src="https://assets.ccbp.in/frontend/intermediate-rwd/best-service-stats-website-logo.png" alt="" />

                <h1 class="bss-header">Hotel Elite</h1>
                <p class="bss-tagline">Celebrate life with us</p>
            </div>
        </div>
        <div class="details-container">
            <h1 class="details-title text">We have the best service</h1>
            <p class="details-content text">Hotel Elite was born in... <br /></p>
            <div class="about">

                    <p class="number text">192</p>

                </div>
                <div class="about-category">
                    <p class="number text">500</p>
                    <p class="category text">Hotels</p>
                </div>
                <div class="about-category">
                    <p class="number text">2989</p>
                    <p class="category text">Rooms</p>
                </div>
                <div class="about-category">
                    <p class="number text">10500+</p>
                    <p class="category text">Employees</p>
                </div>
            </div>
        </div>
    </div>
