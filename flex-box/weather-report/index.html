<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-container">
        <div class="main">
            <div class="current-details">
                <h1 class="location text">Mumbai</h1>
                <p class="weather text">Sunny</p>
                <p class="humi text">78% Humidity</p>
            </div>
            <div class="img-container">
                <img class="img" src="https://assets.ccbp.in/frontend/intermediate-rwd/partly-sunny-img.png" alt="" />
            </div>
        </div>
        <div class="body">
            <div class="weather-condition">
                <p class="day text">Tomorrow</p>
                <img class="cond-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/partly-cloudy-img.png" alt="" />
                <div class="temp">
                    <p class="main-temp">32<sup>o</sup></p>
                    <p>24<sup>o</sup></p>
                </div>
                <p class="condition text">Cloudy</p>
            </div>
            <hr />
            <div class="weather-condition">
                <p class="day text">3rd Nov</p>
                <img class="cond-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/rain-with-sun-img.png" alt="" />
                <div class="temp">
                    <p class="main-temp">26<sup>o</sup></p>
                    <p>20<sup>o</sup></p>
                </div>
                <p class="condition text">Rainy</p>
            </div>
            <hr />
            <div class="weather-condition">
                <p class="day text">4th Nov</p>
                <img class="cond-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/sunny-img.png" alt="" />
                <div class="temp">
                    <p class="main-temp">48<sup>o</sup></p>
                    <p>36<sup>o</sup></p>
                </div>
                <p class="condition text">Sunny</p>
            </div>
            <hr />
            <div class="weather-condition">
                <p class="day text">5th Nov</p>
                <img class="cond-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/rain-with-sun-img.png" alt="" />
                <div class="temp">
                    <p class="main-temp">26<sup>o</sup></p>
                    <p>18<sup>o</sup></p>
                </div>
                <p class="condition text">Rainy</p>
            </div>
            <hr />
            <div class="weather-condition">
                <p class="day text">6th Nov</p>
                <img class="cond-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/sunny-img.png" alt="" />
                <div class="temp">
                    <p class="main-temp">44<sup>o</sup></p>
                    <p>32<sup>o</sup></p>
                </div>
                <p class="condition text">Sunny</p>
            </div>
            <hr />
            <div class="weather-condition">
                <p class="day text">7th Nov</p>
                <img class="cond-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/partly-cloudy-img.png" alt="" />
                <div class="temp">
                    <p class="main-temp">35<sup>o</sup></p>
                    <p>26<sup>o</sup></p>
                </div>
                <p class="condition text">Cloudy</p>
            </div>
            <hr />
            <div class="weather-condition">
                <p class="day text">8th Nov</p>
                <img class="cond-img" src="https://assets.ccbp.in/frontend/intermediate-rwd/rain-with-sun-img.png" alt="" />
                <div class="temp">
                    <p class="main-temp">29<sup>o</sup></p>
                    <p>26<sup>o</sup></p>
                </div>
                <p class="condition text">Rainy</p>
            </div>
        </div>
    </div>
</body>

</html>
